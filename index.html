<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World </title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #132238;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 206, 115, 0.88), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(93, 214, 188, 0.82), transparent 30%),
        radial-gradient(circle at 50% 88%, rgba(242, 116, 116, 0.72), transparent 32%),
        linear-gradient(135deg, #f6f1df 0%, #d9f0ef 48%, #f8dfd4 100%);
      overflow: hidden;
    }

    main {
      width: min(90vw, 720px);
      padding: 56px 36px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.54);
      box-shadow: 0 24px 80px rgba(40, 57, 82, 0.18);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 8vw, 6.5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      max-width: 520px;
      margin: 24px auto 0;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.6;
      color: #35445a;
    }

    .spark {
      display: inline-block;
      margin-bottom: 22px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #132238;
      color: #fff9ed;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <div class="spark">First page</div>
    <h1>Hello Good morning </h1>
    <p>A bright little starter page with a soft glass panel and a warm colorful background.</p>
  </main>
</body>
</html>
